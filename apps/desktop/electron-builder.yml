appId: com.electron.app
productName: frontend
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  # src/ is excluded from the app bundle, so ship the Drizzle migration SQL +
  # meta/_journal.json the runtime migrator needs as a resource instead.
  - from: src/main/db/migrations
    to: migrations
asarUnpack:
  - resources/**
  # The Claude Agent SDK ships a native CLI binary that cannot execute from
  # inside the asar archive; unpack the SDK + its platform-specific package.
  - '**/node_modules/@anthropic-ai/claude-agent-sdk*/**'
# Clean executable + artifact names. The scoped package name (@offlineclass/desktop)
# is not a valid file-path token, so it cannot drive executableName / ${name}.
executableName: offlineclass
nsis:
  artifactName: offlineclass-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: offlineclass-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: offlineclass-${version}.${ext}
deb:
  artifactName: offlineclass-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Eliezir
  repo: OfflineClass
