<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />

    <title>OfflineClass — Provas em grupo, ao vivo, sem internet</title>
    <meta
      name="description"
      content="App desktop para aplicar avaliações colaborativas na rede local da sala. O computador do professor vira o servidor; os alunos entram pela Wi-Fi e respondem em grupo, em tempo real — sem depender da internet."
    />
    <meta name="keywords" content="avaliações, provas online, sala de aula, rede local, LAN, offline, tempo real, colaboração, QR code, professor, IFAL" />
    <meta name="author" content="OfflineClass" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0c0e16" />
    <link rel="canonical" href="https://eliezir.github.io/OfflineClass/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OfflineClass" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://eliezir.github.io/OfflineClass/" />
    <meta property="og:title" content="OfflineClass — Provas em grupo, ao vivo, sem internet" />
    <meta
      property="og:description"
      content="Avaliações colaborativas na rede local da sala. O professor hospeda, os alunos entram pela Wi-Fi e respondem em grupo, em tempo real — offline."
    />
    <meta property="og:image" content="https://eliezir.github.io/OfflineClass/assets/banner-dark.png" />
    <meta property="og:image:alt" content="OfflineClass — avaliações colaborativas na rede local" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OfflineClass — Provas em grupo, ao vivo, sem internet" />
    <meta
      name="twitter:description"
      content="Avaliações colaborativas na rede local da sala — em tempo real, sem depender da internet."
    />
    <meta name="twitter:image" content="https://eliezir.github.io/OfflineClass/assets/banner-dark.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "OfflineClass",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "macOS, Windows, Linux",
        "description": "App desktop para aplicar avaliações colaborativas na rede local da sala — em tempo real, sem depender da internet.",
        "url": "https://eliezir.github.io/OfflineClass/",
        "image": "https://eliezir.github.io/OfflineClass/assets/banner-dark.png",
        "inLanguage": "pt-BR",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL" },
        "author": { "@type": "Organization", "name": "OfflineClass — Sistemas Operacionais & Redes" }
      }
    </script>

    <script>
      // Tema antes da pintura para evitar flash.
      try {
        const t = localStorage.getItem('offlineclass-theme')
        const dark = t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', dark)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
