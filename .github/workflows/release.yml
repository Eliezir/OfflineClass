name: Release

# Builds the OfflineClass Windows installers and publishes them to a single
# GitHub Release. Run manually from the Actions tab.
#
# Windows-only: the Linux (AppImage/deb) targets were dropped — the deb build
# needs extra per-app metadata and Linux isn't a target platform for the
# classroom machines. The build matrix below documents how to re-enable Linux.
#
# What it produces (one combined Release tagged v<version>):
#   - Teacher app  (@offlineclass/desktop)     → offlineclass-<version>-setup.exe
#                                                 + latest.yml  (auto-update)
#   - Student app  (@offlineclass/student-web) → offlineclass-student-<version>-setup.exe
#                                                 + student.yml (auto-update)
#
# The Release is built as a draft, then published automatically once both builds
# succeed (uncheck the `publish` input to leave it a draft for manual review).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (no leading "v"), e.g. 1.0.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the release as a pre-release'
        required: false
        type: boolean
        default: false
      publish:
        description: 'Publish the release when builds succeed (uncheck to leave it a draft for review)'
        required: false
        type: boolean
        default: true

# Need write access to create the Release and upload assets.
permissions:
  contents: write

# Only one release run per version at a time.
concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  # Create the draft Release up front so the parallel build jobs only ever
  # find-and-upload — avoids electron-builder's "two jobs both create the
  # release" race when several OS/app builds publish to the same tag.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release (if absent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ inputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing it."
          else
            gh release create "$tag" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes "OfflineClass $tag — Teacher (desktop) and Student apps for Windows and Linux." \
              ${{ inputs.prerelease && '--prerelease' || '' }}
          fi

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows-only: the Linux (AppImage/deb) targets were dropped — see the
          # `on:` note below. Re-add ubuntu-latest rows with `builder: --linux
          # AppImage deb` to bring Linux back.
          # Teacher app
          - app: '@offlineclass/desktop'
            dir: apps/desktop
            os: windows-latest
            builder: --win
          # Student app
          - app: '@offlineclass/student-web'
            dir: apps/student-web
            os: windows-latest
            builder: --win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        working-directory: ${{ matrix.dir }}
        run: npm pkg set version=${{ inputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install just this app and its workspace deps. The app's postinstall runs
      # `electron-builder install-app-deps`, rebuilding native modules
      # (better-sqlite3 in the teacher app) for the current OS + Electron ABI.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter ${{ matrix.app }}...

      - name: Build renderer + main
        run: pnpm --filter ${{ matrix.app }} run build

      # Package and publish to the draft Release. electron-builder reads each
      # app's electron-builder.yml (GitHub publish provider) and uploads the
      # installers + auto-update metadata to v<version>.
      - name: Package and publish
        working-directory: ${{ matrix.dir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder ${{ matrix.builder }} --publish always

  # Flip the draft Release to published once every build uploaded its assets.
  # Gated on the `publish` input so a run can still produce a draft for review.
  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ inputs.version }}" --draft=false --repo "${{ github.repository }}"
